<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Emoji Decoder Overlay</title>
    <link rel="stylesheet" href="/overlay.css" />
    <link rel="stylesheet" href="/widget-theme.css" />
  </head>
  <body>
    <aside id="badge-alert" class="badge-alert hidden" aria-live="polite">
      <small>ACHIEVEMENT UNLOCKED</small>
      <h2 id="badge-user"></h2>
      <p id="badge-names"></p>
    </aside>
    <div id="stage" class="stage hidden">
      <section class="popup">
        <div class="beam"></div>
        <div class="top">
          <span id="category"></span><span id="timer">15.0</span>
        </div>
        <div class="label" id="label">EMOJI DECODER</div>
        <div id="emojis" class="emojis"></div>
        <div id="prompt" class="prompt">Everyone can score</div>
        <section
          id="result-sequence"
          class="result-sequence off"
          aria-live="polite"
          aria-atomic="true"
        >
          <div class="result-step result-answer">
            <span class="result-kicker">THE ANSWER</span>
            <strong id="result-answer"></strong>
            <small>Round complete</small>
          </div>
          <div class="result-step result-winner">
            <span class="result-kicker">ROUND WINNER</span>
            <strong id="result-winner-name"></strong>
            <div class="winner-meta">
              <span
                ><b id="result-winner-speed"></b
                ><small id="result-winner-speed-label"> solve</small></span
              >
              <span
                ><b id="result-winner-points"></b
                ><small id="result-winner-points-label"> points</small></span
              >
            </div>
          </div>
          <div class="result-step result-podium">
            <span class="result-kicker">TOP SOLVERS</span>
            <div id="result-podium" class="podium"></div>
          </div>
          <div class="result-step result-next">
            <span class="result-kicker">NEXT ROUND</span>
            <strong id="result-next-countdown"></strong>
            <small id="result-next-note"></small>
          </div>
          <div class="result-progress" aria-hidden="true">
            <i id="result-progress-1"></i><i id="result-progress-2"></i
            ><i id="result-progress-3"></i><i id="result-progress-4"></i>
          </div>
        </section>
        <div id="community" class="community">
          <div>
            <span id="community-label">COMMUNITY GOAL</span
            ><b id="community-value"></b>
          </div>
          <div class="community-track"><i id="community-fill"></i></div>
        </div>
        <div id="winner" class="winner"></div>
        <div id="highscores" class="highscores"></div>
      </section>
      <aside id="board" class="board"></aside>
    </div>
    <script src="/widget-theme.js"></script>
    <script src="/cloud-overlay.js"></script>
  </body>
</html>
